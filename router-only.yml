name: router-only

mgmt:
  network: clab-mgmt
  ipv4-subnet: 172.25.0.0/24

# ══════════════════════════════════════════════════════════════════════════════
#  트래픽 흐름:
#    VM (veth-ext: 10.0.1.100/24)
#        │
#    router eth1 (10.0.1.1/24)         ← FRR 외부 경계
#    router eth2 (10.0.10.1/24)
#        │ host:veth-sur
#    [Suricata --network host]          ← AF_PACKET inline IPS
#        │ host:veth-dmz → sw-dmz
#        ├── dvwa        (10.0.10.10)  ← DMZ 웹앱 (DVWA)
#        ├── spring      (10.0.10.20)  ← DMZ Spring 서버 (포트 8080)
#        └── fw-int eth1 (10.0.10.254) ← 내부 경계 방화벽
#                 │ eth2 (10.0.20.1)
#             sw-intranet
#                 └── was (ProxySQL, 10.0.20.10)  ← WAS (MySQL 프록시)
#                 │ eth3 (10.0.30.1)
#             sw-db
#                 └── mysqlserver1 (10.0.30.10)   ← DB 존
#
#  배포: sudo ./deploy-router-only.sh && sudo ./start-suricata.sh
#  Spring 이미지 빌드: cd DockerContainers/SpringServer && docker build -t vts-spring:latest .
# ══════════════════════════════════════════════════════════════════════════════

topology:
  nodes:

    # ── 외부 경계 라우터 ───────────────────────────────────────────────────────
    router:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - configs/frr/router:/etc/frr
      sysctls:
        net.ipv4.ip_forward: 1
        net.ipv6.conf.all.forwarding: 1

    # ── DMZ 스위치 ────────────────────────────────────────────────────────────
    sw-dmz:
      kind: bridge

    # ── DVWA (DMZ 웹앱) ───────────────────────────────────────────────────────
    dvwa:
      kind: linux
      image: vulnerables/web-dvwa:local
      binds:
        - DockerContainers/DVWA/config.inc.php:/var/www/html/config/config.inc.php

    # ── Spring 서버 (DMZ, 포트 8080) ─────────────────────────────────────────
    spring:
      kind: linux
      image: vts-spring:latest

    # ── fw-int (DMZ/Intranet/DB 경계 방화벽) ─────────────────────────────────
    fw-int:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - configs/frr/fw-int:/etc/frr
      sysctls:
        net.ipv4.ip_forward: 1

    # ── Intranet 스위치 ───────────────────────────────────────────────────────
    sw-intranet:
      kind: bridge

    # ── WAS (ProxySQL — MySQL 프록시) ─────────────────────────────────────────
    was:
      kind: linux
      image: proxysql/proxysql:latest
      binds:
        - configs/proxysql/proxysql.cnf:/etc/proxysql.cnf

    # ── DB 스위치 ─────────────────────────────────────────────────────────────
    sw-db:
      kind: bridge

    # ── MySQL 서버 (DB 존) ────────────────────────────────────────────────────
    mysqlserver1:
      kind: linux
      image: mysql:8.0
      cmd: --default-authentication-plugin=mysql_native_password
      binds:
        - DockerContainers/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      env:
        MYSQL_ROOT_PASSWORD: rootpass
        MYSQL_DATABASE: dvwa
        MYSQL_USER: dvwa
        MYSQL_PASSWORD: dvwapass

  links:
    # ── 외부 (WAN) : VM 역할 ──────────────────────────────────────────────────
    - endpoints: ["router:eth1", "host:veth-ext"]   # 10.0.1.0/24

    # ── router → Suricata 입력 ───────────────────────────────────────────────
    - endpoints: ["router:eth2", "host:veth-sur"]   # 10.0.10.0/24  AF_PACKET 입력

    # ── Suricata 출력(veth-dmz) → sw-dmz : start-suricata.sh 에서 수동 연결 ─

    # ── DMZ 멤버 ──────────────────────────────────────────────────────────────
    - endpoints: ["dvwa:eth1",   "sw-dmz:dmz-dvwa"]    # 10.0.10.10
    - endpoints: ["spring:eth1", "sw-dmz:dmz-spring"]  # 10.0.10.20
    - endpoints: ["fw-int:eth1", "sw-dmz:dmz-fwint"]   # 10.0.10.254

    # ── Intranet 멤버 ─────────────────────────────────────────────────────────
    - endpoints: ["fw-int:eth2", "sw-intranet:intranet-fwint"]  # 10.0.20.1
    - endpoints: ["was:eth1",    "sw-intranet:intranet-was"]    # 10.0.20.10

    # ── DB 멤버 ───────────────────────────────────────────────────────────────
    - endpoints: ["fw-int:eth3",       "sw-db:db-fwint"]   # 10.0.30.1
    - endpoints: ["mysqlserver1:eth1", "sw-db:db-mysql"]   # 10.0.30.10
