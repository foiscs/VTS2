name: router-only

mgmt:
  network: clab-mgmt
  ipv4-subnet: 172.25.0.0/24

# ══════════════════════════════════════════════════════════════════════════════
#  PHASE 1: Router 단독 토폴로지  (Suricata / DMZ 는 별도 스크립트로 추가)
#
#  트래픽 흐름:
#    VM (veth-ext: 10.0.1.100/24)
#        │
#    router eth1 (10.0.1.1/24)       ← FRR 외부 경계
#    router eth2 (10.0.10.1/24)
#        │ host:veth-sur              ← Suricata 입력 (start-suricata.sh)
#    [Suricata --network host]        ← AF_PACKET inline IPS
#        │ host:veth-dmz              ← 수동 생성 (start-suricata.sh)
#        └── sw-dmz (Linux bridge)   ← 다음 단계에서 DMZ 노드 추가
#
#  단계별 배포:
#    1.  sudo ./deploy-router-only.sh   ← clab (router만)
#    2.  sudo ./start-suricata.sh       ← veth-dmz 생성 + Suricata 시작
# ══════════════════════════════════════════════════════════════════════════════

topology:
  nodes:

    # ── 외부 경계 라우터 ───────────────────────────────────────────────────────
    router:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - configs/frr/router:/etc/frr
      sysctls:
        net.ipv4.ip_forward: 1
        net.ipv6.conf.all.forwarding: 1

    # ── DMZ 스위치 (Linux bridge) ─────────────────────────────────────────────
    sw-dmz:
      kind: bridge

    # ── DVWA (DMZ 웹앱) ───────────────────────────────────────────────────────
    dvwa:
      kind: linux
      image: vulnerables/web-dvwa

  links:
    # ── 외부 (WAN) : VM 역할 ──────────────────────────────────────────────────
    - endpoints: ["router:eth1", "host:veth-ext"]   # 10.0.1.0/24

    # ── router → Suricata 입력 ───────────────────────────────────────────────
    - endpoints: ["router:eth2", "host:veth-sur"]   # 10.0.10.0/24  AF_PACKET 입력

    # ── Suricata 출력(veth-dmz) → sw-dmz : start-suricata.sh 에서 수동 연결 ─

    # ── DMZ 멤버 ──────────────────────────────────────────────────────────────
    - endpoints: ["dvwa:eth1", "sw-dmz:dmz-dvwa"]  # 10.0.10.10
