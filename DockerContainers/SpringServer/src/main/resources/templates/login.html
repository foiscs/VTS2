<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <h1><span style="color:#60a5fa">사내 게시판</span></h1>
        <p class="lead">사내 계정으로 로그인하세요.</p>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/login}" method="post" autocomplete="off">
            <div class="form-group">
                <label for="username">아이디</label>
                <input id="username" name="username" type="text"
                       th:value="${username}" placeholder="예: alice" required>
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input id="password" name="password" type="password"
                       placeholder="비밀번호" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">로그인</button>
        </form>

        <div class="footer-link">
            아직 계정이 없으신가요? <a th:href="@{/signup}">회원가입</a>
        </div>

    </div>
</div>
</body>
</html>
