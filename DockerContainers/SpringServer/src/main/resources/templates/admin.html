<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 대시보드</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="navbar">
    <div class="brand">관리자 콘솔</div>
    <nav>
        <a th:href="@{/board}">게시판</a>
        <a th:href="@{/admin}">관리자</a>
        <a th:href="@{/logout}">로그아웃</a>
    </nav>
    <div class="userbox">
        <b th:text="${currentUser.username}">user</b>
        <span th:text="' · ' + ${currentUser.role}"></span>
    </div>
</div>

<div class="container">
    <div class="warn-strip">
        ⚠ 관리자 콘솔 — 외부 노출 금지. 모든 작업은 감사 로그에 기록됩니다.
    </div>

    <h1 class="page-title">사용자 목록</h1>
    <table class="list">
        <thead>
        <tr>
            <th>ID</th>
            <th>아이디</th>
            <th>비밀번호 (평문)</th>
            <th>이메일</th>
            <th>부서</th>
            <th>권한</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.username}"></td>
            <td><code th:text="${u.password}"></code></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.department}"></td>
            <td th:text="${u.role}"></td>
        </tr>
        </tbody>
    </table>

    <h1 class="page-title" style="margin-top:28px;">전체 게시글</h1>
    <table class="list">
        <thead>
        <tr>
            <th style="width:60px;">ID</th>
            <th>제목</th>
            <th style="width:120px;">작성자</th>
            <th style="width:90px;">분류</th>
            <th style="width:120px;">작성일</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${posts}">
            <td th:text="${p.id}"></td>
            <td><a th:href="@{'/post/' + ${p.id}}" th:text="${p.title}"></a></td>
            <td th:text="${p.author}"></td>
            <td th:text="${p.category}"></td>
            <td th:text="${#temporals.format(p.createdAt, 'MM-dd HH:mm')}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
