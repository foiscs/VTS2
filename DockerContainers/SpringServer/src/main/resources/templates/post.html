<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${post.title}">글 상세</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="navbar">
    <div class="brand">사내 게시판</div>
    <nav>
        <a th:href="@{/board}">게시판</a>
        <a th:href="@{/post/write}">글쓰기</a>
        <a th:href="@{/user/profile}">내 정보</a>
        <a th:href="@{/logout}">로그아웃</a>
    </nav>
    <div class="userbox">
        <b th:text="${currentUser.username}">user</b>
    </div>
</div>

<div class="container">
    <div class="card">
        <div style="margin-bottom:8px;">
            <span class="cat-badge"
                  th:classappend="${post.category} == '공지' ? ' notice'
                                 : (${post.category} == '업무' ? ' work' : '')"
                  th:text="${post.category}"></span>
        </div>
        <h1 class="page-title" style="margin-bottom:8px;" th:text="${post.title}"></h1>
        <div class="post-meta">
            <a th:href="@{'/user/profile?id=' + ${post.authorId}}"
               th:text="${post.author}"></a>
            · <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
            · 조회 <span th:text="${post.views}"></span>
        </div>
        <div class="post-content" th:text="${post.content}"></div>

        <div class="post-actions">
            <a th:href="@{/board}" class="btn btn-secondary">목록</a>
            <a th:href="@{'/post/edit?id=' + ${post.id}}" class="btn btn-primary">수정</a>
            <a th:href="@{'/post/delete?id=' + ${post.id}}"
               class="btn btn-danger"
               onclick="return confirm('정말 삭제하시겠습니까?');">삭제</a>
        </div>
    </div>
</div>
</body>
</html>
