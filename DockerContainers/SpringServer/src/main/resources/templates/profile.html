<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>내 정보</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="navbar">
    <div class="brand">사내 게시판</div>
    <nav>
        <a th:href="@{/board}">게시판</a>
        <a th:href="@{/post/write}">글쓰기</a>
        <a th:href="@{/user/profile}">내 정보</a>
        <a th:href="@{/logout}">로그아웃</a>
    </nav>
    <div class="userbox">
        <b th:text="${currentUser.username}">user</b>
    </div>
</div>

<div class="container">
    <div class="card">
        <h1 class="page-title" th:text="${isSelf} ? '내 정보' : '직원 정보'"></h1>
        <p class="subtitle"
           th:if="${isSelf}">사내 시스템에 등록된 내 프로필입니다.</p>
        <p class="subtitle"
           th:unless="${isSelf}">
            다른 사원의 공개 프로필입니다.
            (URL 파라미터 <code>?id=</code> 로 식별됩니다)
        </p>

        <div class="kv">
            <div class="k">사번</div>      <div class="v" th:text="${profile.id}"></div>
            <div class="k">아이디</div>    <div class="v" th:text="${profile.username}"></div>
            <div class="k">이메일</div>    <div class="v" th:text="${profile.email}"></div>
            <div class="k">부서</div>      <div class="v" th:text="${profile.department}"></div>
            <div class="k">권한</div>      <div class="v" th:text="${profile.role}"></div>
        </div>

        <div style="margin-top:20px;display:flex;gap:8px;">
            <a th:href="@{/board}" class="btn btn-secondary">목록으로</a>
            <a th:if="${isSelf}" th:href="@{/logout}" class="btn btn-danger">로그아웃</a>
        </div>
    </div>
</div>
</body>
</html>
