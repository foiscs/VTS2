<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <h1>회원가입</h1>
        <p class="lead">사내 게시판 이용을 위해 계정을 생성합니다.</p>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/signup}" method="post" th:object="${user}" autocomplete="off">
            <div class="form-group">
                <label>아이디</label>
                <input type="text" th:field="*{username}" placeholder="영문 5자 이상" required>
            </div>
            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" th:field="*{password}" placeholder="비밀번호" required>
            </div>
            <div class="form-group">
                <label>이메일</label>
                <input type="email" th:field="*{email}" placeholder="example@reznok.local">
            </div>
            <div class="form-group">
                <label>부서</label>
                <input type="text" th:field="*{department}" placeholder="예: 개발1팀">
            </div>
            <button type="submit" class="btn btn-primary btn-block">계정 만들기</button>
        </form>

        <div class="footer-link">
            이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a>
        </div>
    </div>
</div>
</body>
</html>
