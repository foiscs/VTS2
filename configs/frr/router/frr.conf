frr version 9.1
frr defaults traditional
hostname router
log syslog informational
no ipv6 forwarding
!
! ── 인터페이스 구성 ────────────────────────────────────────────────────────────
!
!  eth1 : WAN/외부 facing  →  host:veth-ext
!         서브넷: 10.0.1.0/24
!         호스트 veth-ext IP: 10.0.1.100/24  (아래 커맨드로 재설정 필요)
!           sudo ip addr flush dev veth-ext
!           sudo ip addr add 10.0.1.100/24 dev veth-ext
!
!  eth2 : Suricata input 방향  →  host:veth-sur  →  Suricata  →  veth-dmz
!         서브넷: 10.0.10.0/24  (DMZ 게이트웨이)
!         트래픽: eth1(WAN) → 라우팅 → eth2 → Suricata 통과 → veth-dmz(10.0.10.10)
! ──────────────────────────────────────────────────────────────────────────────
!
interface eth1
 description WAN-external
 ip address 10.0.1.1/24
!
interface eth2
 description to-Suricata-IPS-input
 ip address 10.0.10.1/24
!
ip forwarding
!
! Intranet 구간: fw-int(10.0.10.254) 경유
ip route 10.0.20.0/24 10.0.10.254
!
line vty
!
